quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}

quarkus.hibernate-orm.schema-management.strategy=${DB_SCHEMA_STRATEGY:update}
quarkus.hibernate-orm.sql-load-script=${DB_SQL_LOAD_SCRIPT:no-file}

firebase.credentials.path=${FIREBASE_SERVICE_ACCOUNT_LOCATION:/firebase-service-account.json}
firebase.web-api-key=${FIREBASE_WEB_API_KEY:not-configured}

quarkus.rest-client.sinaica-api.url=${SINAICA_API_URL:https://api.sinaica.inecc.gob.mx}
quarkus.rest-client.era-climate-api.url=${ERA_CLIMATE_API_URL:https://cds.climate.copernicus.eu}
quarkus.rest-client.inegi-api.url=${INEGI_API_URL:https://www.inegi.org.mx/app/api}
quarkus.rest-client.conacyt-api.url=${CONACYT_API_URL:https://api.conacyt.mx}

irsa.refresh.cron=${IRSA_REFRESH_CRON:0 0 * * * ?}
irsa.prediccion.cron=${IRSA_PREDICCION_CRON:0 5 0 * * ?}
irsa.alert.cooldown.hours=${IRSA_ALERT_COOLDOWN_HOURS:6}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:https://sanitek-frontend-443589660460.us-central1.run.app}
quarkus.http.cors.methods=GET,PUT,POST
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

quarkus.smallrye-openapi.info-title=Sanitek API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true

# Messaging: Kafka - async IRSA calculations
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.outgoing.irsa-calculation-out.connector=smallrye-kafka
mp.messaging.outgoing.irsa-calculation-out.topic=sanitek.irsa.calculation
mp.messaging.outgoing.irsa-calculation-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.irsa-calculation-in.connector=smallrye-kafka
mp.messaging.incoming.irsa-calculation-in.topic=sanitek.irsa.calculation
mp.messaging.incoming.irsa-calculation-in.group.id=sanitek-irsa-calculation
mp.messaging.incoming.irsa-calculation-in.auto.offset.reset=earliest
mp.messaging.incoming.irsa-calculation-in.value.deserializer=org.acme.infrastructure.messaging.kafka.IrsaCalculationMessageDeserializer

# Messaging: RabbitMQ - alert fanout
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}

mp.messaging.outgoing.alert-events-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.alert-events-out.exchange.name=sanitek.alert.events
mp.messaging.outgoing.alert-events-out.exchange.type=fanout
mp.messaging.outgoing.alert-events-out.exchange.declare=true

mp.messaging.incoming.email-alerts-in.connector=smallrye-rabbitmq
mp.messaging.incoming.email-alerts-in.queue.name=sanitek.alerts.email
mp.messaging.incoming.email-alerts-in.queue.declare=true
mp.messaging.incoming.email-alerts-in.exchange.name=sanitek.alert.events
mp.messaging.incoming.email-alerts-in.exchange.type=fanout
mp.messaging.incoming.email-alerts-in.exchange.declare=true

mp.messaging.incoming.push-alerts-in.connector=smallrye-rabbitmq
mp.messaging.incoming.push-alerts-in.queue.name=sanitek.alerts.push
mp.messaging.incoming.push-alerts-in.queue.declare=true
mp.messaging.incoming.push-alerts-in.exchange.name=sanitek.alert.events
mp.messaging.incoming.push-alerts-in.exchange.type=fanout
mp.messaging.incoming.push-alerts-in.exchange.declare=true

mp.messaging.incoming.audit-alerts-in.connector=smallrye-rabbitmq
mp.messaging.incoming.audit-alerts-in.queue.name=sanitek.alerts.audit
mp.messaging.incoming.audit-alerts-in.queue.declare=true
mp.messaging.incoming.audit-alerts-in.exchange.name=sanitek.alert.events
mp.messaging.incoming.audit-alerts-in.exchange.type=fanout
mp.messaging.incoming.audit-alerts-in.exchange.declare=true

quarkus.kafka.devservices.enabled=false
quarkus.rabbitmq.devservices.enabled=false
messaging.enabled=${MESSAGING_ENABLED:false}
mp.messaging.outgoing.irsa-calculation-out.enabled=${MESSAGING_ENABLED:false}
mp.messaging.incoming.irsa-calculation-in.enabled=${MESSAGING_ENABLED:false}
mp.messaging.outgoing.alert-events-out.enabled=${MESSAGING_ENABLED:false}
mp.messaging.incoming.email-alerts-in.enabled=${MESSAGING_ENABLED:false}
mp.messaging.incoming.push-alerts-in.enabled=${MESSAGING_ENABLED:false}
mp.messaging.incoming.audit-alerts-in.enabled=${MESSAGING_ENABLED:false}

%prod.messaging.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.outgoing.irsa-calculation-out.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.incoming.irsa-calculation-in.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.outgoing.alert-events-out.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.incoming.email-alerts-in.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.incoming.push-alerts-in.enabled=${MESSAGING_ENABLED:false}
%prod.mp.messaging.incoming.audit-alerts-in.enabled=${MESSAGING_ENABLED:false}

quarkus.log.category."org.acme.infrastructure.messaging".level=DEBUG

quarkus.log.category."org.apache.kafka".level=WARN
quarkus.log.category."io.smallrye.reactive.messaging".level=WARN
quarkus.log.category."io.smallrye.reactive.messaging.kafka".level=WARN
quarkus.log.category."io.smallrye.reactive.messaging.rabbitmq".level=WARN
quarkus.log.category."com.rabbitmq".level=WARN
quarkus.log.category."io.vertx.rabbitmq".level=WARN
quarkus.log.category."io.vertx.core".level=WARN

# Test profile: in-memory connectors avoid external brokers.
%test.mp.messaging.outgoing.irsa-calculation-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.irsa-calculation-in.connector=smallrye-in-memory
%test.mp.messaging.outgoing.alert-events-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.email-alerts-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.push-alerts-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.audit-alerts-in.connector=smallrye-in-memory

# Mailer. En prod queda mockeado por default hasta configurar un proveedor real.
quarkus.mailer.host=${MAILER_HOST:sandbox.smtp.mailtrap.io}
quarkus.mailer.port=${MAILER_PORT:2525}
quarkus.mailer.username=${MAILER_USERNAME:}
quarkus.mailer.password=${MAILER_PASSWORD:}
quarkus.mailer.from=${MAILER_FROM:a01666336@tec.mx}
quarkus.mailer.start-tls=${MAILER_START_TLS:DISABLED}
quarkus.mailer.tls.trust-all=${MAILER_TLS_TRUST_ALL:true}
quarkus.mailer.mock=${MAILER_MOCK:false}
