# ─── Base de datos (MySQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:root}
quarkus.datasource.password=${DB_PASSWORD:Sanitek_1}
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sanitek}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# Deshabilitar Dev Services (no levantar contenedor Docker automáticamente)
quarkus.datasource.devservices.enabled=false

# drop-and-create en desarrollo, validate en producción
quarkus.hibernate-orm.database.generation=drop-and-create
# Cargar seed data siempre que se recree el esquema
quarkus.hibernate-orm.sql-load-script=import.sql

# ─── Firebase ────────────────────────────────────────────────────────────────
# Ruta dentro de src/main/resources/ — NO commitear el archivo al repositorio
firebase.credentials.path=/firebase-service-account.json
# Poner en false hasta tener el archivo firebase-service-account.json
firebase.enabled=false

# ─── APIs externas (datasource clients) ──────────────────────────────────────
quarkus.rest-client.sinaica-api.url=${SINAICA_API_URL:https://api.sinaica.inecc.gob.mx}
quarkus.rest-client.era-climate-api.url=${ERA_CLIMATE_API_URL:https://cds.climate.copernicus.eu}
quarkus.rest-client.inegi-api.url=${INEGI_API_URL:https://www.inegi.org.mx/app/api}
quarkus.rest-client.conacyt-api.url=${CONACYT_API_URL:https://api.conacyt.mx}

# ─── Datos de salud (CSVs epidemiológicos) ───────────────────────────────────
# Ruta relativa al directorio de ejecución del proyecto
salud.csv.basepath=docs/output_by_year

# ─── Scheduler IRSA ──────────────────────────────────────────────────────────
# Cron: cada hora por defecto. Sobreescribir con variable de entorno IRSA_REFRESH_CRON
irsa.refresh.cron=${IRSA_REFRESH_CRON:0 0 * * * ?}
# Predicciones: cada día a las 00:05 hora servidor (ajusta con variable de entorno si necesitas)
irsa.prediccion.cron=${IRSA_PREDICCION_CRON:0 5 0 * * ?}

# ─── HTTP ────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.cors=true
# Wildcard + orígenes locales explícitos para Quarkus 3.x (5173 Vite, 3000 CRA, 4173 preview)
quarkus.http.cors.origins=*,http://localhost:5173,http://localhost:3000,http://localhost:4173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin,access-control-request-method,access-control-request-headers

# ─── OpenAPI / Swagger UI ────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=Sanitek API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
